{% extends "base.html" %}

{% block title %}编辑车辆{% endblock %}

{% block header %}
<div class="d-flex align-items-center">
    <a href="/residents/{{ vehicle.resident_id }}" class="btn btn-sm btn-outline-secondary me-3" title="返回住户详情">
        ← 返回
    </a>
    <h1 class="h2 mb-0">编辑车辆</h1>
</div>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">车牌号</label>
                        <input type="text" name="plate_number" class="form-control" value="{{ vehicle.plate_number }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">品牌</label>
                        <input type="text" name="brand" class="form-control" value="{{ vehicle.brand or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">颜色</label>
                        <input type="text" name="color" class="form-control" value="{{ vehicle.color or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">车辆类型</label>
                        <select name="vehicle_type" class="form-control">
                            <option value="小车" {% if vehicle.vehicle_type == '小车' %}selected{% endif %}>小车</option>
                            <option value="大车" {% if vehicle.vehicle_type == '大车' %}selected{% endif %}>大车</option>
                            <option value="摩托" {% if vehicle.vehicle_type == '摩托' %}selected{% endif %}>摩托</option>
                            <option value="新能源" {% if vehicle.vehicle_type == '新能源' %}selected{% endif %}>新能源</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-control">
                            <option value="正常" {% if vehicle.status == '正常' %}selected{% endif %}>正常</option>
                            <option value="停用" {% if vehicle.status == '停用' %}selected{% endif %}>停用</option>
                        </select>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="isGarage" name="is_garage" {% if vehicle.is_garage %}checked{% endif %}>
                            <label class="form-check-label" for="isGarage">
                                <strong>车库车</strong>（有效期内免费，过期需到前台办理）
                            </label>
                        </div>
                    </div>
                    <div id="garageFields" {% if not vehicle.is_garage %}style="display: none;"{% endif %}>
                        <div class="mb-3">
                            <label class="form-label">车库编号</label>
                            <div class="input-group">
                                <input type="text" name="garage_number" id="garageNumberInput" class="form-control" value="{{ vehicle.garage_number or '' }}" placeholder="如：A001">
                                <button type="button" id="garageNumberToggle" class="btn btn-outline-secondary" onclick="toggleGarageNumber()">
                                    使用房号
                                </button>
                            </div>
                            <small id="garageNumberHint" class="text-muted"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">有效期至</label>
                            <input type="date" name="garage_valid_until" class="form-control" value="{{ vehicle.garage_valid_until.strftime('%Y-%m-%d') if vehicle.garage_valid_until else '' }}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" onclick="enableGarageInputBeforeSubmit()">保存</button>
                    <a href="/residents/{{ vehicle.resident_id }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('isGarage').addEventListener('change', function() {
    var garageFields = document.getElementById('garageFields');
    if (this.checked) {
        garageFields.style.display = 'block';
    } else {
        garageFields.style.display = 'none';
    }
});

var garageNumber = '{{ vehicle.garage_number or "" }}';
var roomNumber = '{{ vehicle.resident.room_number if vehicle.resident else "" }}';
var garageUsingRoomNumber = (garageNumber && roomNumber && garageNumber === roomNumber);

function enableGarageInputBeforeSubmit() {
    var input = document.getElementById('garageNumberInput');
    if (input) {
        input.disabled = false;
    }
}

function toggleGarageNumber() {
    var input = document.getElementById('garageNumberInput');
    var button = document.getElementById('garageNumberToggle');
    var hint = document.getElementById('garageNumberHint');
    
    if (!input || !button) {
        return;
    }
    
    var roomNumber = '{{ vehicle.resident.room_number if vehicle.resident else "" }}';
    
    if (garageUsingRoomNumber) {
        input.disabled = false;
        input.placeholder = '如：A001';
        button.textContent = '使用房号';
        button.classList.remove('btn-secondary');
        button.classList.add('btn-outline-secondary');
        if (hint) {
            hint.textContent = '';
        }
        garageUsingRoomNumber = false;
    } else {
        if (!roomNumber) {
            alert('该车辆没有关联住户，无法使用房号');
            return;
        }
        input.value = roomNumber;
        input.disabled = true;
        button.textContent = '自定义';
        button.classList.remove('btn-outline-secondary');
        button.classList.add('btn-secondary');
        if (hint) {
            hint.textContent = '已使用房号: ' + roomNumber;
        }
        garageUsingRoomNumber = true;
    }
}

// 初始化状态
document.addEventListener('DOMContentLoaded', function() {
    if (garageUsingRoomNumber) {
        toggleGarageNumber();
    }
});
</script>
{% endblock %}
