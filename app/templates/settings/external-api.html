{% extends "base.html" %}

{% block title %}外部接口配置{% endblock %}
{% block header %}外部接口配置{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        
        <!-- 分页导航 -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link" href="/settings">系统基本设置</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/settings/temp-rules">临时停车费率规则</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/settings/external-api">外部接口配置</a>
            </li>
        </ul>
        
        <div class="card">
            <div class="card-header">外部接口配置</div>
            <div class="card-body">
                <form method="post" action="/settings/save-external-api">
                    <div class="mb-3">
                        <label class="form-label">API 访问令牌（留空则不启用）</label>
                        <input type="text" name="api_token" class="form-control" value="{{ api_token.value }}">
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveBtn" disabled>保存设置</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.querySelector('form[action="/settings/save-external-api"]');
        const saveBtn = document.getElementById('saveBtn');
        const initialValues = new Map();
        
        // 保存初始值
        form.querySelectorAll('input, textarea, select').forEach(el => {
            initialValues.set(el.name, el.value);
        });
        
        // 检查是否有变化
        function checkChanges() {
            let hasChanges = false;
            form.querySelectorAll('input, textarea, select').forEach(el => {
                if (el.value !== initialValues.get(el.name)) {
                    hasChanges = true;
                }
            });
            saveBtn.disabled = !hasChanges;
        }
        
        // 监听输入变化
        form.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', checkChanges);
            el.addEventListener('change', checkChanges);
        });
    })();
</script>
{% endblock %}
