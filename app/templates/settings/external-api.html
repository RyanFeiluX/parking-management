{% extends "base.html" %}

{% block title %}外部接口配置{% endblock %}
{% block header %}外部接口配置{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <!-- 分页导航 -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link" href="/settings">系统基本设置</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/settings/temp-rules">临时停车费率规则</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/settings/external-api">外部接口配置</a>
            </li>
        </ul>
        
        <div class="card">
            <div class="card-header">外部接口配置</div>
            <div class="card-body">
                {% if success %}
                <div class="alert alert-success">
                    {{ success }}
                </div>
                {% endif %}
                <form method="post" action="/settings/save-external-api">
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-4 col-form-label">API 访问令牌（留空则不启用）</label>
                        <div class="col-sm-8">
                            <input type="text" name="api_token" class="form-control" value="{{ api_token.value }}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveBtn" disabled>保存设置</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    (function() {
        const form = document.querySelector('form[action="/settings/save-external-api"]');
        const saveBtn = document.getElementById('saveBtn');
        let initialData = null;
        
        function captureInitialData() {
            const currentData = new FormData(form);
            const currentValues = {};
            currentData.forEach((value, key) => {
                currentValues[key] = value;
            });
            initialData = JSON.stringify(currentValues);
        }
        
        function checkChanges() {
            const currentData = new FormData(form);
            const currentValues = {};
            currentData.forEach((value, key) => {
                currentValues[key] = value;
            });
            const hasChanges = JSON.stringify(currentValues) !== initialData;
            saveBtn.disabled = !hasChanges;
        }
        
        // 页面加载完成后保存初始值
        document.addEventListener('DOMContentLoaded', () => {
            captureInitialData();
            saveBtn.disabled = true;
        });
        
        // 监听输入变化
        form.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', checkChanges);
            el.addEventListener('change', checkChanges);
        });
    })();
</script>
{% endblock %}
